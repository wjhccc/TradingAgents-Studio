<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d03050"/>
      <stop offset="0.55" stop-color="#e8804a"/>
      <stop offset="1" stop-color="#f0c050"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#g)"/>

  <!-- TAS — tighter kerning so 3 letters fit comfortably -->
  <text x="32" y="32" text-anchor="middle"
        font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif"
        font-weight="800" font-size="20" letter-spacing="-1.2"
        fill="#ffffff">TAS</text>

  <!-- Three candlesticks rising to the right -->
  <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round">
    <line x1="15" y1="44" x2="15" y2="56"/>
    <line x1="32" y1="40" x2="32" y2="56"/>
    <line x1="49" y1="36" x2="49" y2="56"/>
  </g>
  <rect x="13" y="46" width="4" height="8"  fill="#ffffff" rx="0.5"/>
  <rect x="30" y="42" width="4" height="10" fill="#ffffff" rx="0.5"/>
  <rect x="47" y="38" width="4" height="14" fill="#ffffff" rx="0.5"/>

  <!-- Trend line + arrowhead -->
  <polyline points="15,46 32,42 49,38" stroke="#ffffff" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
  <polygon points="49,38 53,40 51,44" fill="#ffffff" opacity="0.85"/>
</svg>
