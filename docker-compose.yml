services:
  tradingagents:
    build: .
    env_file:
      - .env
    environment:
      # In a container the server must bind 0.0.0.0 (not 127.0.0.1) to be
      # reachable through the published port, and reload must be off.
      - TRADINGAGENTS_WEB_HOST=0.0.0.0
      - TRADINGAGENTS_WEB_RELOAD=0
    ports:
      - "8000:8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - TRADINGAGENTS_WEB_HOST=0.0.0.0
      - TRADINGAGENTS_WEB_RELOAD=0
    ports:
      - "8000:8000"
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  tradingagents_data:
  ollama_data:
